# team.yml — M1 必填，由参赛队员手动填写
# GitHub Action `milestone-check.yml` 会自动校验本文件

team_id: team-06               # 系统分配，请勿修改（如 team-01）
team_number: ""                # 中文组号，如 "一组"
team_name: ""                  # 队员自取的队名，例如 "蜂巢"
pioneer_lead: ""               # 队长姓名（必填）

members:
  - name: ""                   # 必填：姓名
    office: ""                 # 必填：深圳 / 长沙 / 呼和浩特
    dingtalk_handle: ""        # 选填：钉钉 ID（用于话题圈 sync）
    github_username: ""        # 必填：GitHub 用户名（须已加入 lifebee-vibe-coding org）
  # 复制本块到 3-4 行（每队 3-4 人）

# M1 校验通过条件：
# 1. team_name 非空
# 2. pioneer_lead 非空
# 3. members 至少 3 人，至少 2 个不同 office
# 4. 所有 members[].name / .office / .github_username 非空
